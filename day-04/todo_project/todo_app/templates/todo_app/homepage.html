{% extends 'todo_app/base.html' %}
{% block content %}

    <h1>Todo List</h1>

    {% for todo in all_todos %}

        <h2>{{ todo.name }}</h2>
        <p>Complete: {{ todo.completed }}</p>
        <a href="{% url 'edit_todo' pk=todo.id %}">Edit</a>
        <a href="{% url 'delete_todo' pk=todo.id %}">Delete</a>

    {% endfor %}

{% endblock %}
